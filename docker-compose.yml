services:
  dryrun:
    build:
      context: .
      dockerfile: Dockerfile
      target: server-runtime
    image: dryrun:local
    restart: unless-stopped
    init: true
    volumes:
      - ./env.toml:/app/env.toml:ro
    environment:
      APP_SERVER__HOST: 0.0.0.0
      APP_METRICS__ENABLED: "true"
      APP_METRICS__LISTEN_ADDRESS: 0.0.0.0:9000
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    image: dryrun-web:local
    restart: unless-stopped
    depends_on:
      - dryrun
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true
