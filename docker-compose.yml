services:
  dryrun-evm:
    build:
      context: .
      dockerfile: Dockerfile
      target: evm-runtime
    image: dryrun-evm:local
    restart: unless-stopped
    init: true
    volumes:
      - ./dryrun-evm/env.toml:/app/env.toml:ro
    environment:
      APP_SERVER__HOST: 0.0.0.0
      APP_METRICS__ENABLED: "true"
      APP_METRICS__LISTEN_ADDRESS: 0.0.0.0:9000
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  dryrun-conflux:
    build:
      context: .
      dockerfile: Dockerfile
      target: conflux-runtime
    image: dryrun-conflux:local
    restart: unless-stopped
    init: true
    environment:
      DRYRUN_CONFLUX_LISTEN_ADDR: 0.0.0.0:8547
      DRYRUN_CONFLUX_HEALTH_LISTEN_ADDR: 0.0.0.0:9001
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    image: dryrun-web:local
    restart: unless-stopped
    depends_on:
      - dryrun-evm
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true
